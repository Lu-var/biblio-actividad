server:
  port: 8083
spring:
  application:
    name: prestamos
  datasource:
    url: jdbc:h2:mem:prestamosdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

libros-service:
  url: http://localhost:8081
usuarios-service:
  url: http://localhost:8082
